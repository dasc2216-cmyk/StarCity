<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#04050a">
<title>Star City</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050a; --bg-m:#0f1118; --bg-l:#171c28; --bg-card:#111520;
  --line:#1e2230; --line2:#303650;
  --gold:#c9a849; --gold-b:#f0d878; --gold-d:#6a5018;
  --copper:#b87840; --copper-b:#d89858;
  --jade:#587860; --jade-b:#78a888;
  --p1:#2868a8; --p1b:#4898d8;
  --p2:#9a1818; --p2b:#d04040;
  --text:#e8e3d4; --text-m:#8a8478; --text-d:#3e3c36;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);touch-action:manipulation}
body{font-family:'Cinzel',serif;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* FONDO */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 150% 50% at 50% 0%,rgba(201,168,73,.08) 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 10% 100%,rgba(40,104,168,.05) 0%,transparent 50%),
    radial-gradient(ellipse 60% 60% at 90% 100%,rgba(154,24,24,.05) 0%,transparent 50%)}
#bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(201,168,73,.012) 1px,transparent 1px),
  linear-gradient(90deg,rgba(201,168,73,.012) 1px,transparent 1px);
  background-size:52px 52px}
#bg-vig{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 20%,rgba(0,0,0,.92) 100%)}

/* ESQUINAS */
.cr{position:fixed;width:36px;height:36px;z-index:0;pointer-events:none}
.cr::before,.cr::after{content:'';position:absolute;background:rgba(201,168,73,.18)}
.cr::before{width:100%;height:1px;top:0;left:0}
.cr::after{width:1px;height:100%;top:0;left:0}
.cr.tl{top:14px;left:14px}.cr.tr{top:14px;right:14px;transform:scaleX(-1)}
.cr.bl{bottom:14px;left:14px;transform:scaleY(-1)}.cr.br{bottom:14px;right:14px;transform:scale(-1)}

/* PANTALLAS */
.screen{position:relative;z-index:1;width:100%;max-width:420px;padding:20px 16px;
  display:none;flex-direction:column;align-items:center;gap:12px;
  height:100dvh;overflow-y:auto;scrollbar-width:none;justify-content:center}
.screen::-webkit-scrollbar{display:none}
.screen.on{display:flex}

/* LOGO */
.logo{text-align:center;user-select:none;margin-bottom:4px}
.logo h1{font-family:'Cinzel Decorative',serif;font-size:clamp(30px,9vw,52px);font-weight:700;
  letter-spacing:.14em;line-height:1.1;
  background:linear-gradient(160deg,#4a3810 0%,#8a6820 14%,#c9a849 30%,#f0d878 45%,#fff8e0 50%,#f0d878 55%,#c9a849 70%,#8a6820 86%,#4a3810 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 22px rgba(201,168,73,.32))}
.logo p{font-size:clamp(8px,2.2vw,12px);letter-spacing:.52em;color:rgba(201,168,73,.42);margin-top:4px}
.logo-ver{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--text-d);letter-spacing:.2em;margin-top:3px}
.rule{display:flex;align-items:center;gap:6px;width:65%;margin:6px auto}
.rule::before,.rule::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,73,.28),transparent)}
.gem{width:5px;height:5px;background:rgba(201,168,73,.4);transform:rotate(45deg)}

/* STATUS */
.sbox{width:100%;background:var(--bg-m);border:1px solid var(--line);
  border-radius:7px;padding:10px 14px;display:flex;align-items:center;gap:9px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text-d);transition:background .3s}
.dot.wait{background:var(--gold);animation:dp 1.4s ease-in-out infinite}
.dot.ok{background:#448866}.dot.err{background:#7a2828}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.18}}
.sbox p{font-size:11px;color:var(--text-m);line-height:1.4}
.sbox p b{color:var(--text)}

/* DIVIDER */
.div{width:100%;display:flex;align-items:center;gap:8px;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-d)}
.div::before,.div::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--line2),transparent)}

/* BOTONES */
.btn{width:100%;padding:13px;border-radius:6px;border:1px solid var(--line2);
  background:linear-gradient(160deg,var(--bg-l),var(--bg-m));color:var(--text-m);
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 60%);pointer-events:none}
.btn:active{transform:scale(.97)}
.btn.gold{border-color:rgba(201,168,73,.45);
  background:linear-gradient(160deg,rgba(201,168,73,.14),rgba(201,168,73,.05));
  color:var(--gold-b);box-shadow:0 0 28px rgba(201,168,73,.07)}
.btn.gold:hover{background:linear-gradient(160deg,rgba(201,168,73,.22),rgba(201,168,73,.08))}
.btn.jade{border-color:rgba(88,120,96,.5);
  background:linear-gradient(160deg,rgba(88,120,96,.13),rgba(88,120,96,.05));color:var(--jade-b)}
.btn.ghost{background:transparent;border-color:var(--line);color:var(--text-d);font-size:10px;padding:9px}
.btn.back-btn{background:none;border:none;color:var(--text-d);font-size:9px;
  letter-spacing:.14em;padding:0;width:auto;align-self:flex-start}
.btn:disabled{opacity:.25;pointer-events:none}

/* INPUTS */
.field{width:100%;display:flex;flex-direction:column;gap:5px}
.field label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-d)}
.field input{width:100%;padding:11px 14px;border-radius:6px;border:1px solid var(--line);
  background:var(--bg-m);color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none}
.field input:focus{border-color:rgba(201,168,73,.45);box-shadow:0 0 0 3px rgba(201,168,73,.07)}
.field input::placeholder{color:var(--text-d)}

/* CÓDIGO BOX */
#cod-box{width:100%;background:linear-gradient(135deg,var(--bg-m),var(--bg));
  border:1px solid rgba(201,168,73,.32);border-radius:9px;padding:20px;text-align:center;
  box-shadow:0 0 40px rgba(201,168,73,.05);display:none}
#cod-box.on{display:block}
.cod-lbl{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-d);margin-bottom:8px}
#cod-val{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;
  color:var(--gold);letter-spacing:.34em;text-shadow:0 0 22px rgba(201,168,73,.48)}
.cod-hint{font-size:10px;color:var(--text-d);margin-top:6px;font-style:italic}
.cod-wait{display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:10px;font-size:10px;color:var(--text-d)}

/* BADGE JUGADOR */
.player-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
  border-radius:20px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.pb-p1{background:rgba(40,104,168,.12);border:1px solid rgba(40,104,168,.3);color:var(--p1b)}
.pb-p2{background:rgba(154,24,24,.12);border:1px solid rgba(154,24,24,.3);color:var(--p2b)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);
  background:rgba(12,14,20,.96);backdrop-filter:blur(10px);
  border:1px solid var(--line2);border-radius:7px;padding:9px 20px;
  font-size:11px;letter-spacing:.06em;color:var(--text-m);white-space:nowrap;
  opacity:0;pointer-events:none;z-index:999;transition:all .25s}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:rgba(68,136,102,.5);color:#68c888}
#toast.err{border-color:rgba(122,40,40,.5);color:#c87878}

.spin{display:inline-block;width:11px;height:11px;border-radius:50%;
  border:2px solid var(--line);border-top-color:var(--copper);
  animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="bg"></div><div id="bg-grid"></div><div id="bg-vig"></div>
<div class="cr tl"></div><div class="cr tr"></div>
<div class="cr bl"></div><div class="cr br"></div>
<div id="toast"></div>

<!-- ══ HOME ══ -->
<div class="screen on" id="s-home">
  <div class="logo">
    <h1>STAR CITY</h1>
    <p>Legends of the Board</p>
    <div class="rule"><div class="gem"></div></div>
    <div class="logo-ver">v1.0 · by Star City Studio</div>
  </div>

  <div class="sbox">
    <div class="dot wait" id="dot"></div>
    <p id="stxt">Verificando servidor… <span class="spin"></span></p>
  </div>

  <!-- Acciones principales -->
  <button class="btn gold" onclick="go('s-online')">🌐 Jugar Online</button>
  <button class="btn ghost" onclick="irSandbox()">▶ Sandbox · mismo dispositivo</button>
</div>

<!-- ══ ONLINE ══ -->
<div class="screen" id="s-online">
  <button class="btn back-btn" onclick="go('s-home')">← Volver</button>

  <div class="logo">
    <h1 style="font-size:clamp(22px,6vw,34px)">STAR CITY</h1>
    <p style="font-size:8px">Multijugador Online</p>
    <div class="rule"><div class="gem"></div></div>
  </div>

  <div class="field">
    <label>Tu nombre</label>
    <input id="inp-nombre" type="text" placeholder="Capitán…" maxlength="20"
      autocomplete="off" spellcheck="false">
  </div>

  <!-- Nueva partida -->
  <button class="btn gold" id="btn-nueva" onclick="crearPartida()">⚔ Nueva Partida</button>

  <!-- Código generado -->
  <div id="cod-box">
    <div class="cod-lbl">Comparte este código</div>
    <div id="cod-val">——</div>
    <div class="cod-hint">Tu rival lo ingresa para unirse</div>
    <div class="cod-wait">
      <span class="spin"></span>
      <span>Esperando rival…</span>
    </div>
    <button class="btn ghost" style="margin-top:8px;font-size:9px" onclick="copiarCod()">
      Copiar código
    </button>
  </div>

  <div class="div">o únete a una partida</div>

  <!-- Unirse -->
  <div class="field">
    <label>Código de partida (6 letras)</label>
    <input id="inp-cod" type="text" placeholder="ABC123" maxlength="6"
      style="text-transform:uppercase;letter-spacing:.35em;font-size:22px;text-align:center"
      oninput="this.value=this.value.toUpperCase()" autocomplete="off">
  </div>
  <button class="btn jade" onclick="unirsePartida()">🔗 Unirse</button>
</div>

<script>
/* ══════════════════════════════════════════════════
   ██  CAMBIAR AQUÍ LA URL DEL APPS SCRIPT        ██
   ══════════════════════════════════════════════════ */
const WEBAPP = 'https://script.google.com/macros/s/AKfycbz_wj4rjKkltB_PaJk2cunhFh3JxYKcgeU_cBV7T8F9xHOL9QjJVHnUhr_EqI8Ma6I3/exec';

/* URL del juego en el mismo repo */
const GAME = 'StarCity.html';

/* ══ ESTADO ══ */
let pollT = null, idActivo = null;

/* ══ BOOT ══ */
window.addEventListener('DOMContentLoaded', ping);

async function ping() {
  try {
    await net('ping');
    setDot('ok', '✓ Servidor conectado');
  } catch(e) {
    setDot('err', '⚠ Sin conexión al servidor');
  }
}

/* ══ JSONP ══ */
function net(action, params) {
  params = params || {};
  return new Promise((res, rej) => {
    const cb = '_s_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
    params.action   = action;
    params.callback = cb;
    const qs = new URLSearchParams(params).toString();
    const s  = document.createElement('script');
    const t  = setTimeout(() => { clean(); rej(new Error('Timeout')); }, 15000);
    const clean = () => { clearTimeout(t); delete window[cb]; s.remove(); };
    window[cb] = d => { clean(); d.ok ? res(d.data) : rej(new Error(d.error||'err')); };
    s.src = WEBAPP + '?' + qs;
    s.onerror = () => { clean(); rej(new Error('Network')); };
    document.head.appendChild(s);
  });
}

/* ══ NAV ══ */
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

/* ══ SANDBOX ══ */
function irSandbox() { window.location.href = GAME; }

/* ══ CREAR PARTIDA ══ */
async function crearPartida() {
  const nombre = document.getElementById('inp-nombre').value.trim() || 'Jugador 1';
  const id     = genCod();
  idActivo     = id;

  document.getElementById('btn-nueva').disabled = true;

  try {
    await net('nueva_partida', { id, mazo_j1:'Medieval', jugador_j1:nombre });

    // Mostrar código
    document.getElementById('cod-val').textContent = id;
    document.getElementById('cod-box').classList.add('on');
    setDot('ok', '✓ Partida <b>'+id+'</b> creada · Esperando rival…');
    toast('Código: '+id, 'ok');

    // Poll lobby cada 5s
    if (pollT) clearInterval(pollT);
    pollT = setInterval(async () => {
      try {
        const d = await net('lobby', { id });
        if (d && d.Estado === 'en_curso') {
          clearInterval(pollT);
          toast('¡'+( d.Jugador_J2||'Rival')+' se unió! Iniciando…', 'ok');
          setTimeout(() => irJuego({
            id, jugador:'p1', nombre,
            rival: d.Jugador_J2 || 'Rival'
          }), 700);
        }
      } catch(e) {}
    }, 5000);

  } catch(e) {
    setDot('err', '⚠ '+e.message);
    document.getElementById('btn-nueva').disabled = false;
    toast('Error: '+e.message, 'err');
  }
}

/* ══ UNIRSE ══ */
async function unirsePartida() {
  const nombre = document.getElementById('inp-nombre').value.trim() || 'Jugador 2';
  const cod    = document.getElementById('inp-cod').value.trim().toUpperCase();

  if (cod.length !== 6) { toast('El código debe tener 6 caracteres', 'err'); return; }

  setDot('wait', 'Uniéndose a <b>'+cod+'</b>… <span class="spin"></span>');

  try {
    await net('unirse', { id:cod, mazo_j2:'Samurai', jugador_j2:nombre });
    toast('¡Unido a '+cod+'! Iniciando…', 'ok');
    setTimeout(() => irJuego({
      id: cod, jugador: 'p2', nombre, rival: 'Rival'
    }), 600);
  } catch(e) {
    setDot('err', '⚠ '+e.message);
    toast('Error: '+e.message, 'err');
  }
}

/* ══ IR AL JUEGO ══ */
function irJuego(p) {
  const qs = new URLSearchParams({
    id:      p.id,
    jugador: p.jugador,
    nombre:  p.nombre,
    rival:   p.rival,
    webapp:  WEBAPP,
  }).toString();
  window.location.href = GAME + '?' + qs;
}

/* ══ UTILS ══ */
function genCod() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, ()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function setDot(s, m) {
  document.getElementById('dot').className = 'dot '+s;
  document.getElementById('stxt').innerHTML = m;
}
function copiarCod() {
  const v = document.getElementById('cod-val').textContent;
  navigator.clipboard?.writeText(v)
    .then(() => toast('¡Código '+v+' copiado!', 'ok'))
    .catch(() => toast(v, 'ok'));
}
let _tt;
function toast(m, t) {
  const el = document.getElementById('toast');
  el.textContent = m; el.className = 'on '+(t||'');
  clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 3400);
}
</script>
</body>
</html>
