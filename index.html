<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#04050a">
<title>Star City · Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:      #04050a;
  --surface: #0b0d14;
  --line:    #1c2030;
  --gold:    #c9a849;
  --gold-b:  #f0d878;
  --gold-d:  #6a5018;
  --chrome:  #8090b8;
  --text:    #e8e3d4;
  --text-d:  #44403a;
  --cs: clamp(18px, calc((min(100vw, 560px) - 18px) / 15), 34px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'Cinzel', serif;
  color: var(--text);
  touch-action: manipulation;
}
body {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* ── FONDO ── */
#bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 140% 60% at 50% 0%,
      rgba(201,168,73,.06) 0%, transparent 55%),
    radial-gradient(ellipse 80% 80% at 20% 90%,
      rgba(40,80,160,.04) 0%, transparent 50%),
    radial-gradient(ellipse 80% 80% at 80% 90%,
      rgba(160,30,30,.04) 0%, transparent 50%);
}
#bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(201,168,73,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,73,.015) 1px, transparent 1px);
  background-size: 48px 48px;
}
#bg-vignette {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 25%, rgba(0,0,0,.92) 100%);
}

/* ── ESQUINAS DECORATIVAS ── */
.corner {
  position: fixed; width: 36px; height: 36px; z-index: 0; pointer-events: none;
}
.corner::before, .corner::after {
  content: ''; position: absolute; background: rgba(201,168,73,.22);
}
.corner::before { width: 100%; height: 1px; top: 0; left: 0; }
.corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
.c-tl { top: 14px; left: 14px; }
.c-tr { top: 14px; right: 14px; transform: scaleX(-1); }
.c-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
.c-br { bottom: 14px; right: 14px; transform: scale(-1); }

/* ── TÍTULO ── */
#title {
  position: relative; z-index: 1;
  text-align: center; margin-bottom: 10px; user-select: none;
}
#title h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(18px, 5vw, 32px);
  font-weight: 700; letter-spacing: .16em;
  background: linear-gradient(160deg,
    #4a3810 0%, #8a6820 14%,
    #c9a849 30%, #f0d878 45%,
    #fff8e0 50%, #f0d878 55%,
    #c9a849 70%, #8a6820 86%, #4a3810 100%);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 18px rgba(201,168,73,.3));
}
#title p {
  font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: .5em; color: rgba(201,168,73,.45);
  margin-top: 3px; text-transform: uppercase;
}
.rule {
  display: flex; align-items: center; gap: 6px;
  margin: 6px auto 0; width: 70%;
}
.rule::before, .rule::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,73,.3), transparent);
}
.rule-gem {
  width: 5px; height: 5px;
  background: rgba(201,168,73,.5);
  transform: rotate(45deg); flex-shrink: 0;
}

/* ── WRAPPER ISO ── */
#board-wrap {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
}

/* ISO STAGE */
.iso {
  transform: rotateX(44deg) rotateZ(-26deg) scale(.86);
  transform-style: preserve-3d;
  filter:
    drop-shadow(0 24px 60px rgba(0,0,0,.9))
    drop-shadow(0  6px 20px rgba(0,0,0,.6))
    drop-shadow(0  0  60px rgba(201,168,73,.04));
}

/* ── BOARD ── */
#board {
  display: grid;
  grid-template-columns: repeat(15, var(--cs));
  grid-template-rows:    repeat(15, var(--cs));
  gap: 1px;
  /* separadores dorados */
  background: linear-gradient(135deg,
    rgba(201,168,73,.18) 0%,
    rgba(201,168,73,.08) 40%,
    rgba(201,168,73,.14) 100%);
  /* borde exterior metálico */
  border: 1px solid rgba(201,168,73,.35);
  border-radius: 3px; overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(201,168,73,.10),
    0 0 28px rgba(201,168,73,.08),
    0 8px 50px rgba(0,0,0,.85),
    inset 0 0 0 1px rgba(255,255,255,.04);
}

/* ── CELDAS ── */
.cell {
  width: var(--cs); height: var(--cs);
  position: relative; cursor: pointer; overflow: visible;
  background: #07080d;
  transition: background .12s ease;
}

/* zona superior (rival) */
.cell.ze { background: #0b0608; }
/* zona centro */
.cell.zc { background: #07080d; }
/* zona inferior (jugador) */
.cell.zy { background: #060a0d; }

/* ── CELDA ACTIVA (con pieza) ── */
.cell.active {
  background: rgba(201,168,73,.08) !important;
}

/* ── HOVER ── */
.cell:not(.active):hover {
  background: rgba(201,168,73,.07);
}
/* efecto holográfico en hover */
.cell:not(.active)::after {
  content: ''; position: absolute; inset: 0; z-index: 8;
  opacity: 0;
  background: linear-gradient(135deg,
    rgba(201,168,73,.0)   0%,
    rgba(201,168,73,.12) 45%,
    rgba(192,220,255,.06) 55%,
    rgba(201,168,73,.0)  100%);
  border: 1px solid rgba(201,168,73,.0);
  transition: opacity .16s, border-color .16s;
  pointer-events: none;
}
.cell:not(.active):hover::after {
  opacity: 1;
  border-color: rgba(201,168,73,.3);
  box-shadow: inset 0 0 5px rgba(201,168,73,.1);
}

/* ── PIEZA (imagen) ── */
.cell .piece {
  position: absolute;
  left: -10%; right: -10%;   /* sobresale lateralmente */
  bottom: -20%;               /* ancla en el piso de la celda */
  height: 175%;               /* talla alta = parece que está DE PIE sobre el tablero */
  z-index: 3;
  display: flex; align-items: flex-end; justify-content: center;
  pointer-events: none;
  transition: transform .22s ease, filter .25s ease;
}
.cell:hover .piece { transform: translateY(-3px) scale(1.04); }

.cell .piece img {
  width: 100%; max-height: 175%;
  object-fit: contain;
  margin-bottom: 0;
  /* elimina fondo blanco en imágenes sin transparencia */
  mix-blend-mode: screen;
  /* sombra isométrica */
  filter:
    drop-shadow(3px 6px 2px rgba(0,0,0,.75))
    drop-shadow(-1px -2px 0 rgba(0,0,0,.5))
    drop-shadow(0 0 8px rgba(201,168,73,.25));
  transition: filter .25s ease, transform .22s ease;
}

/* ACTIVA — aura dorada intensa + elevación */
.cell.active .piece {
  animation: piece-float 3.4s ease-in-out infinite;
}
@keyframes piece-float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

.cell.active .piece img {
  animation: piece-aura 3s ease-in-out infinite;
}
@keyframes piece-aura {
  0%,100% {
    filter:
      drop-shadow(3px 7px 3px rgba(0,0,0,.8))
      drop-shadow(-1px -2px 0 rgba(0,0,0,.5))
      drop-shadow(0 0 16px rgba(201,168,73,.65))
      drop-shadow(0 0  6px rgba(240,216,120,.4));
  }
  50% {
    filter:
      drop-shadow(3px 7px 3px rgba(0,0,0,.8))
      drop-shadow(-1px -2px 0 rgba(0,0,0,.5))
      drop-shadow(0 0 26px rgba(240,216,120,.9))
      drop-shadow(0 0 10px rgba(201,168,73,.6));
  }
}

/* ── BORDE DORADO DE CELDA ACTIVA ── */
.cell.active::before {
  content: ''; position: absolute; inset: 0; z-index: 9;
  pointer-events: none;
  border: 1px solid rgba(201,168,73,.4);
  box-shadow:
    inset 0 0 10px rgba(201,168,73,.1),
    0 0 6px rgba(201,168,73,.2);
  animation: cell-glow 3s ease-in-out infinite;
}
@keyframes cell-glow {
  0%,100% {
    border-color: rgba(201,168,73,.35);
    box-shadow: inset 0 0 8px rgba(201,168,73,.08), 0 0 5px rgba(201,168,73,.15);
  }
  50% {
    border-color: rgba(240,216,120,.6);
    box-shadow: inset 0 0 14px rgba(201,168,73,.18), 0 0 10px rgba(201,168,73,.28);
  }
}

/* ── ESTADO SELECCIONADO ── */
.cell.sel::after {
  opacity: 1 !important;
  background: rgba(201,168,73,.14) !important;
  border-color: var(--gold) !important;
  box-shadow:
    inset 0 0 12px rgba(201,168,73,.25) !important,
    0 0 8px rgba(201,168,73,.3) !important;
  animation: sel-pulse 1.6s ease-in-out infinite;
}
@keyframes sel-pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .5; }
}

/* ── INFO BAR ── */
#info {
  position: relative; z-index: 1;
  margin-top: 10px;
  display: flex; align-items: center; gap: 10px;
  font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: .12em; color: var(--text-d);
}
#info-cell { color: var(--gold); }
.info-sep {
  width: 4px; height: 4px; background: var(--gold-d);
  transform: rotate(45deg); opacity: .5;
}

/* ── PANEL PIEZAS (selector) ── */
#pieces-panel {
  position: relative; z-index: 1;
  margin-top: 10px;
  display: flex; gap: 6px;
  align-items: center;
}
.piece-btn {
  width: 44px; height: 44px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--surface);
  cursor: pointer; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.piece-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.04), transparent 50%);
  pointer-events: none;
}
.piece-btn:hover {
  border-color: rgba(201,168,73,.4);
  box-shadow: 0 0 14px rgba(201,168,73,.1);
}
.piece-btn.sel-piece {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px rgba(201,168,73,.2), 0 0 18px rgba(201,168,73,.18);
}
.piece-btn img {
  width: 80%; height: 80%; object-fit: contain;
  image-rendering: pixelated;
  filter: drop-shadow(0 0 4px rgba(201,168,73,.4));
}
.piece-btn .emo { font-size: 22px; }

/* etiqueta "Selecciona pieza" */
#pieces-label {
  position: relative; z-index: 1;
  font-size: 8px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--text-d);
  margin-top: 4px; text-align: center;
}

/* ── HINT ── */
#hint {
  position: relative; z-index: 1;
  margin-top: 8px;
  font-size: 9px; letter-spacing: .1em;
  color: var(--text-d); text-align: center;
  font-family: 'Cinzel', serif;
}
#hint em { color: var(--gold); font-style: normal; }

</style>
</head>
<body>

<!-- FONDOS -->
<div id="bg"></div>
<div id="bg-grid"></div>
<div id="bg-vignette"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<!-- TÍTULO -->
<div id="title">
  <h1>STAR CITY</h1>
  <p>Legends of the Board</p>
  <div class="rule"><div class="rule-gem"></div></div>
</div>

<!-- TABLERO -->
<div id="board-wrap">
  <div class="iso">
    <div id="board"></div>
  </div>
</div>

<!-- INFO CELDA -->
<div id="info">
  <span>Tablero 15×15</span>
  <div class="info-sep"></div>
  <span id="info-cell">Toca una celda</span>
</div>

<!-- SELECTOR DE PIEZAS -->
<div id="pieces-label">Selecciona una pieza</div>
<div id="pieces-panel"></div>

<!-- HINT -->
<div id="hint">
  Selecciona pieza · Toca celda para colocar · Toca pieza colocada para <em>quitar</em>
</div>

<script>
/* ═══════════════════════════════════════════════════
   PIEZAS DISPONIBLES
   Cambia src por tus imágenes en GitHub Pages.
   Si la imagen no carga, cae a emoji automáticamente.
   ═══════════════════════════════════════════════════ */
const PIECES = [
  { id:'castillo',  label:'Castillo del Rey',  src:'assets/Castillo_del_Rey.png', emoji:'🏰' },
  { id:'rey',       label:'Rey',               src:'assets/Rey.png',              emoji:'👑' },
  { id:'heredero',  label:'Heredero Corona',   src:'assets/Heredero_Corona.png',  emoji:'🤴' },
  { id:'jinete',    label:'Jinete Corona',      src:'assets/Jinete_Corona.png',    emoji:'🐴' },
  { id:'tropa',     label:'Tropa del Rey',      src:'assets/Tropa_del_Rey.png',    emoji:'⚔️' },
  { id:'torre',     label:'Torre Oscura',       src:'assets/Torre_Oscura.png',     emoji:'🗼' },
  { id:'arroz',     label:'Campo de Arroz',     src:'assets/Campo_Arroz.png',      emoji:'🌾' },
  { id:'maiz',      label:'Campo de Maíz',      src:'assets/Campo_Maiz.png',       emoji:'🌽' },
];

/* ═══════════════════════════════════════════════════
   ESTADO
   ═══════════════════════════════════════════════════ */
let selectedPiece = null;        // pieza actualmente seleccionada
const boardState  = {};           // "r-c" → piece id

/* ═══════════════════════════════════════════════════
   BUILD BOARD
   ═══════════════════════════════════════════════════ */
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for (let i = 0; i < 225; i++) {
    const r = Math.floor(i / 15);
    const c = i % 15;

    const cell = document.createElement('div');
    const zone = r < 5 ? 'ze' : r < 10 ? 'zc' : 'zy';
    cell.className = `cell ${zone}`;
    cell.dataset.r = r;
    cell.dataset.c = c;

    cell.addEventListener('click', () => onCellClick(r, c, cell));

    board.appendChild(cell);
  }
}

/* ═══════════════════════════════════════════════════
   CLICK EN CELDA
   ═══════════════════════════════════════════════════ */
function onCellClick(r, c, cell) {
  const key = `${r}-${c}`;

  // Si ya tiene pieza → quitarla
  if (boardState[key]) {
    delete boardState[key];
    cell.classList.remove('active', 'sel');
    cell.querySelectorAll('.piece').forEach(e => e.remove());
    setInfo(`Celda (${c+1},${r+1}) vaciada`);
    return;
  }

  // Si hay pieza seleccionada → colocarla
  if (selectedPiece) {
    boardState[key] = selectedPiece.id;
    renderPiece(cell, selectedPiece);
    setInfo(`${selectedPiece.label} en (${c+1},${r+1})`);
    return;
  }

  // Sin pieza seleccionada → solo info
  setInfo(`Celda (${c+1},${r+1}) · zona ${r < 5 ? 'rival' : r < 10 ? 'centro' : 'jugador'}`);
}

/* ═══════════════════════════════════════════════════
   RENDER PIEZA EN CELDA
   ═══════════════════════════════════════════════════ */
function renderPiece(cell, piece) {
  // limpiar pieza anterior si existe
  cell.querySelectorAll('.piece').forEach(e => e.remove());
  cell.classList.add('active');

  const wrap = document.createElement('div');
  wrap.className = 'piece';

  const img = document.createElement('img');
  img.alt = piece.label;

  // intenta cargar la imagen real; si falla → emoji
  img.src = piece.src;
  img.onerror = () => {
    wrap.removeChild(img);
    const span = document.createElement('span');
    span.style.cssText = `
      font-size: calc(var(--cs) * .78);
      line-height: 1; margin-bottom: 1px;
      filter: drop-shadow(0 0 8px rgba(201,168,73,.6))
              drop-shadow(1px -2px 0 rgba(0,0,0,.7))
              drop-shadow(2px 4px 0 rgba(0,0,0,.6));
    `;
    span.textContent = piece.emoji;
    wrap.appendChild(span);
  };

  wrap.appendChild(img);
  cell.appendChild(wrap);
}

/* ═══════════════════════════════════════════════════
   SELECTOR DE PIEZAS
   ═══════════════════════════════════════════════════ */
function buildPiecesPanel() {
  const panel = document.getElementById('pieces-panel');
  panel.innerHTML = '';

  PIECES.forEach(piece => {
    const btn = document.createElement('div');
    btn.className = 'piece-btn';
    btn.title = piece.label;

    // intenta mostrar imagen; si falla → emoji
    const img = document.createElement('img');
    img.src = piece.src;
    img.alt = piece.label;
    img.onerror = () => {
      btn.removeChild(img);
      const em = document.createElement('span');
      em.className = 'emo';
      em.textContent = piece.emoji;
      btn.appendChild(em);
    };
    btn.appendChild(img);

    btn.addEventListener('click', () => selectPiece(piece, btn));
    panel.appendChild(btn);
  });
}

function selectPiece(piece, btn) {
  // toggle: si ya estaba seleccionada, deseleccionar
  if (selectedPiece && selectedPiece.id === piece.id) {
    selectedPiece = null;
    document.querySelectorAll('.piece-btn').forEach(b => b.classList.remove('sel-piece'));
    setInfo('Toca una celda');
    return;
  }

  selectedPiece = piece;
  document.querySelectorAll('.piece-btn').forEach(b => b.classList.remove('sel-piece'));
  btn.classList.add('sel-piece');
  setInfo(`${piece.label} seleccionado · toca una celda`);
}

/* ═══════════════════════════════════════════════════
   INFO
   ═══════════════════════════════════════════════════ */
function setInfo(msg) {
  document.getElementById('info-cell').textContent = msg;
}

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
buildBoard();
buildPiecesPanel();
</script>
</body>
</html>
